# =============================================================================
# USAGE NOTES
# =============================================================================
#
# 1. Customizing for Your Domain:
#    - Copy this file to your job config directory: config/{job}_presidio.yaml
#    - Uncomment and modify the example recognizers
#    - Add your own custom patterns based on your data
#
# 2. Regex Pattern Tips:
#    - Use \\b for word boundaries to avoid partial matches
#    - Test your regex patterns thoroughly
#    - Start with lower scores and adjust based on false positives
#    - Use context words to improve accuracy
#
# 3. Context Words:
#    - Context words increase confidence when found near detected PII
#    - Add domain-specific terminology
#    - Include common field names from your MongoDB collections
#
# 4. Score Thresholds:
#    - Pattern score: How confident the pattern match is (0.0-1.0)
#    - Global threshold: Minimum score to report detection
#    - Context words can boost the score
#
# 5. Performance Considerations:
#    - Complex regex patterns can slow down scanning
#    - Use specific patterns rather than broad ones
#    - Consider using deny-lists for exact matches
#
# 6. Testing Your Configuration:
#    - Run a small scan first to validate your patterns
#    - Check for false positives in the scan results
#    - Adjust scores and patterns as needed
#    - Use the allowlist feature to exclude known safe fields
#
# 7. Language Support:
#    - This default config supports English only
#    - To add languages, install appropriate spaCy models
#    - Update supported_languages and add model to nlp_configuration
#
# 8. NLP Model Selection:
#    - en_core_web_lg: Large model, best accuracy, slower
#    - en_core_web_md: Medium model, good balance
#    - en_core_web_sm: Small model, faster but less accurate
#    - Install with: python -m spacy download <model_name>
#
