# =============================================================================
# Anonymizer Registry
# =============================================================================
# This section documents all available anonymization operators.
# Operators are used in the collection configuration to specify how PII should
# be anonymized during replication.
#
# Usage in collection config (new list format):
#   pii_anonymization:
#     - field: email
#       operator: mask_email
#     - field: ssn
#       operator: mask_ssn
#     - field: phone
#       operator: smart_mask
#
# Operator categories:
# 1. Entity-specific mask operators: Preserve format while hiding sensitive data
# 2. Entity-specific fake operators: Generate realistic replacement data
# 3. Smart operators: Detect entity type and delegate to appropriate operator
# 4. Built-in Presidio operators: General-purpose operators
# =============================================================================

anonymizer_registry:
  # ===========================================================================
  # ENTITY-SPECIFIC MASK OPERATORS
  # ===========================================================================
  # These operators preserve the format of the original data while masking
  # sensitive portions. They provide a balance between data utility and privacy.
  # ===========================================================================

  mask_email:
    description: "Mask email local part while preserving domain"
    class: MaskEmailOperator
    supported_entities: [EMAIL_ADDRESS]
    examples:
      - entity_type: EMAIL_ADDRESS
        input: "john.smith@example.com"
        output: "jo******th@example.com"

  mask_phone:
    description: "Mask phone number while showing last 4 digits"
    class: MaskPhoneOperator
    supported_entities: [PHONE_NUMBER]
    examples:
      - entity_type: PHONE_NUMBER
        input: "+1 (555) 123-4567"
        output: "+* (***) ***-4567"

  mask_credit_card:
    description: "Mask credit card showing only last 4 digits"
    class: MaskCreditCardOperator
    supported_entities: [CREDIT_CARD]
    examples:
      - entity_type: CREDIT_CARD
        input: "4242 4242 4242 4242"
        output: "**** **** **** 4242"

  mask_ssn:
    description: "Mask SSN showing only last 4 digits"
    class: MaskSSNOperator
    supported_entities: [US_SSN]
    examples:
      - entity_type: US_SSN
        input: "123-45-6789"
        output: "***-**-6789"

  mask_sin:
    description: "Mask Canadian SIN showing only last 3 digits"
    class: MaskSINOperator
    supported_entities: [CA_SIN]
    examples:
      - entity_type: CA_SIN
        input: "123-456-789"
        output: "***-***-789"
      - entity_type: CA_SIN
        input: "123456789"
        output: "******789"

  mask_tin:
    description: "Mask Canadian TIN showing only last 4 digits"
    class: MaskTINOperator
    supported_entities: [CA_TIN]
    examples:
      - entity_type: CA_TIN
        input: "123456789"
        output: "*****6789"
      - entity_type: CA_TIN
        input: "123456789RC0001"
        output: "*****6789RC0001"

  mask_ip_address:
    description: "Mask IP address showing first and last octet"
    class: MaskIPAddressOperator
    supported_entities: [IP_ADDRESS]
    examples:
      - entity_type: IP_ADDRESS
        input: "192.168.1.1"
        output: "192.***.*.1"

  mask_iban:
    description: "Mask IBAN showing country code and last 4 digits"
    class: MaskIBANOperator
    supported_entities: [IBAN_CODE]
    examples:
      - entity_type: IBAN_CODE
        input: "GB82WEST12345698765432"
        output: "GB******************5432"

  mask_person:
    description: "Mask person name showing first character of each word"
    class: MaskPersonOperator
    supported_entities: [PERSON]
    examples:
      - entity_type: PERSON
        input: "John Smith"
        output: "J*** S****"

  mask_location:
    description: "Mask location showing first 3 characters"
    class: MaskLocationOperator
    supported_entities: [LOCATION]
    examples:
      - entity_type: LOCATION
        input: "San Francisco"
        output: "San *********"

  mask_us_bank:
    description: "Mask US bank account showing last 4 of each number"
    class: MaskUSBankAccountOperator
    supported_entities: [US_BANK_ACCOUNT]
    examples:
      - entity_type: US_BANK_ACCOUNT
        input: "Routing: 123456789, Account: 9876543210"
        output: "Routing: *****6789, Account: ******3210"

  mask_ca_bank:
    description: "Mask CA bank account showing last 4 of each number"
    class: MaskCABankAccountOperator
    supported_entities: [CA_BANK_ACCOUNT]
    examples:
      - entity_type: CA_BANK_ACCOUNT
        input: "Transit: 12345, Institution: 789, Account: 1234567890"
        output: "Transit: *2345, Institution: *89, Account: ******7890"

  # ===========================================================================
  # ENTITY-SPECIFIC FAKE OPERATORS
  # ===========================================================================
  # These operators generate realistic replacement data using the Mimesis library.
  # Useful for creating anonymized datasets that maintain data characteristics.
  # ===========================================================================

  fake_email:
    description: "Generate realistic fake email address"
    class: FakeEmailOperator
    supported_entities: [EMAIL_ADDRESS]
    examples:
      - entity_type: EMAIL_ADDRESS
        input: "john.smith@example.com"
        output: "sarah.miller@company.net"

  fake_phone:
    description: "Generate realistic fake phone number"
    class: FakePhoneOperator
    supported_entities: [PHONE_NUMBER]
    examples:
      - entity_type: PHONE_NUMBER
        input: "+1 (555) 123-4567"
        output: "+1 (555) 789-0123"

  fake_credit_card:
    description: "Generate realistic fake credit card number"
    class: FakeCreditCardOperator
    supported_entities: [CREDIT_CARD]
    examples:
      - entity_type: CREDIT_CARD
        input: "4242 4242 4242 4242"
        output: "4532 1234 5678 9010"

  fake_ssn:
    description: "Generate realistic fake SSN"
    class: FakeSSNOperator
    supported_entities: [US_SSN]
    examples:
      - entity_type: US_SSN
        input: "123-45-6789"
        output: "987-65-4321"

  fake_ip:
    description: "Generate realistic fake IP address"
    class: FakeIPAddressOperator
    supported_entities: [IP_ADDRESS]
    examples:
      - entity_type: IP_ADDRESS
        input: "192.168.1.1"
        output: "203.45.67.89"

  fake_iban:
    description: "Generate realistic fake IBAN"
    class: FakeIBANOperator
    supported_entities: [IBAN_CODE]
    examples:
      - entity_type: IBAN_CODE
        input: "GB82WEST12345698765432"
        output: "GB29NWBK60161331926819"

  fake_name:
    description: "Generate realistic fake person name"
    class: FakeNameOperator
    supported_entities: [PERSON]
    examples:
      - entity_type: PERSON
        input: "John Smith"
        output: "Sarah Miller"

  fake_location:
    description: "Generate realistic fake location"
    class: FakeLocationOperator
    supported_entities: [LOCATION]
    examples:
      - entity_type: LOCATION
        input: "San Francisco"
        output: "Chicago"

  fake_us_bank:
    description: "Generate realistic fake US bank account"
    class: FakeUSBankAccountOperator
    supported_entities: [US_BANK_ACCOUNT]
    examples:
      - entity_type: US_BANK_ACCOUNT
        input: "Routing: 123456789, Account: 9876543210"
        output: "Routing: 987654321, Account: 1234567890"

  fake_ca_bank:
    description: "Generate realistic fake CA bank account"
    class: FakeCABankAccountOperator
    supported_entities: [CA_BANK_ACCOUNT]
    examples:
      - entity_type: CA_BANK_ACCOUNT
        input: "Transit: 12345, Institution: 789, Account: 1234567890"
        output: "Transit: 54321, Institution: 123, Account: 9876543210"

  # ===========================================================================
  # SMART OPERATORS
  # ===========================================================================
  # Smart operators detect the entity type from the data format or accept an
  # explicit entity_type parameter, then delegate to the appropriate
  # entity-specific operator.
  # ===========================================================================

  smart_mask:
    description: "Intelligently detect entity type and apply appropriate mask"
    class: SmartMaskOperator
    supported_entities: [EMAIL_ADDRESS, PHONE_NUMBER, CREDIT_CARD, US_SSN, CA_SIN, CA_TIN, IP_ADDRESS, IBAN_CODE, PERSON, LOCATION, US_BANK_ACCOUNT, CA_BANK_ACCOUNT]
    examples:
      - entity_type: EMAIL_ADDRESS
        input: "john.smith@example.com"
        output: "jo******th@example.com"
      - entity_type: PHONE_NUMBER
        input: "555-123-4567"
        output: "***-***-4567"
      - entity_type: CREDIT_CARD
        input: "4242 4242 4242 4242"
        output: "**** **** **** 4242"
      - entity_type: US_SSN
        input: "123-45-6789"
        output: "***-**-6789"
      - entity_type: CA_SIN
        input: "123-456-789"
        output: "***-***-789"
      - entity_type: CA_TIN
        input: "123456789RC0001"
        output: "*****6789RC0001"
      - entity_type: IP_ADDRESS
        input: "192.168.1.1"
        output: "192.***.*.1"
      - entity_type: IBAN_CODE
        input: "GB82WEST12345698765432"
        output: "GB******************5432"
      - entity_type: PERSON
        input: "John Smith"
        output: "J*** S****"
      - entity_type: LOCATION
        input: "San Francisco"
        output: "San *********"
      - entity_type: US_BANK_ACCOUNT
        input: "Routing: 123456789, Account: 9876543210"
        output: "Routing: *****6789, Account: ******3210"
      - entity_type: CA_BANK_ACCOUNT
        input: "Transit: 12345, Institution: 789, Account: 1234567890"
        output: "Transit: *2345, Institution: *89, Account: ******7890"
    notes:
      - "Auto-detects entity type from format"
      - "Falls back to generic masking for unknown types"
      - "Accepts explicit entity_type parameter"

  smart_fake:
    description: "Intelligently detect entity type and generate appropriate fake data"
    class: SmartFakeOperator
    supported_entities: [EMAIL_ADDRESS, PHONE_NUMBER, CREDIT_CARD, US_SSN, CA_SIN, CA_TIN, IP_ADDRESS, IBAN_CODE, PERSON, LOCATION, US_BANK_ACCOUNT, CA_BANK_ACCOUNT]
    examples:
      - entity_type: EMAIL_ADDRESS
        input: "john.smith@example.com"
        output: "sarah.miller@company.net"
      - entity_type: PHONE_NUMBER
        input: "555-123-4567"
        output: "555-987-6543"
      - entity_type: CREDIT_CARD
        input: "4242 4242 4242 4242"
        output: "4532 1234 5678 9010"
      - entity_type: US_SSN
        input: "123-45-6789"
        output: "987-65-4321"
      - entity_type: IP_ADDRESS
        input: "192.168.1.1"
        output: "203.45.67.89"
      - entity_type: IBAN_CODE
        input: "GB82WEST12345698765432"
        output: "GB29NWBK60161331926819"
      - entity_type: PERSON
        input: "John Smith"
        output: "Sarah Miller"
      - entity_type: LOCATION
        input: "San Francisco"
        output: "Chicago"
      - entity_type: US_BANK_ACCOUNT
        input: "Routing: 123456789, Account: 9876543210"
        output: "Routing: 987654321, Account: 1234567890"
      - entity_type: CA_BANK_ACCOUNT
        input: "Transit: 12345, Institution: 789, Account: 1234567890"
        output: "Transit: 54321, Institution: 123, Account: 9876543210"
    notes:
      - "Auto-detects entity type from format"
      - "Falls back to generic identifier for unknown types"
      - "Accepts explicit entity_type parameter"

  # ===========================================================================
  # BUILT-IN PRESIDIO OPERATORS
  # ===========================================================================
  # General-purpose operators provided by Presidio for common anonymization needs.
  # ===========================================================================

  redact:
    description: "Remove PII completely (replace with empty string)"
    type: builtin
    examples:
      - input: "john.smith@example.com"
        output: ""
      - input: "sensitive data"
        output: ""

  mask:
    description: "Replace characters with masking character (default: *)"
    type: builtin
    params:
      - masking_char: "Character to use for masking (default: *)"
      - chars_to_mask: "Number of characters to mask"
      - from_end: "Mask from end instead of beginning (default: false)"
    examples:
      - input: "123456789"
        output: "*****6789"
        params: {chars_to_mask: 5, from_end: false}

  hash:
    description: "SHA-256 hash with random salt for security"
    type: builtin
    params:
      - hash_type: "Hash algorithm (default: sha256)"
    examples:
      - input: "sensitive data"
        output: "a1b2c3d4e5f6..."
    notes:
      - "Uses random salt by default - same input produces different hashes"
      - "Not reversible"

  replace:
    description: "Replace PII with a fixed value"
    type: builtin
    params:
      - new_value: "Value to replace with"
    examples:
      - input: "John Smith"
        output: "REDACTED"
        params: {new_value: "REDACTED"}

  keep:
    description: "Keep original value unchanged (for allowlisting)"
    type: builtin
    examples:
      - input: "not_actually_pii@example.com"
        output: "not_actually_pii@example.com"

